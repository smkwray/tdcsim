# Mergeable example snippets for tdc_config.yaml.
#
# These examples are not loaded automatically. They are intended to be copied
# into the main config when you want to exercise the new optional features
# without changing the shipped default runs.

# ---------------------------------------------------------------------------
# Example A: Config-derived starting portfolio
# ---------------------------------------------------------------------------
#
# This is a run-level setting, not a scenario override. The initial portfolio
# is generated once before scenario groups execute, so all scenarios in a run
# share the same starting stock.
#
# initial_portfolio:
#   mode: config_derived
#   generation:
#     generation_method: config_derived
#     output_filename: "output/initial_bond_portfolio_config_derived.csv"
#     target_public_marketable_wam: 6.0
#     random_seed: 42
#     wam_targeting_iterations: 300
#     target_face_values_billions:
#       Banks: 4400.0
#       Private_Marketable: 10200.0
#       Private_NonMarketable: 700.0
#       CB: 4600.0
#       Foreign: 8100.0
#       FedInternal: 200.0
#       TrustFunds_NonMarketable: 6800.0

