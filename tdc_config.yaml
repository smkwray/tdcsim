# --- Base Configuration ---

simulation_period:
  start_date: '2025-01-01'
  end_date: '2035-01-01'
  frequency: 'W'
  enable_preference_trading: false

initial_values:
  reserves: 2500.0
  tdc_level: 0.0
  tga: 500.0

initial_portfolio:
  mode: generated   # generated preserves legacy behavior; use config_derived for a scenario-consistent stock
  file: output/initial_bond_portfolio.csv
  generation:
    generation_method: legacy
    output_filename: "output/initial_bond_portfolio.csv"
    target_public_marketable_wam: 6.0
    random_seed: 42
    wam_targeting_iterations: 300
    target_face_values_billions:
      Banks: 4400.0
      Private_Marketable: 10200.0
      Private_NonMarketable: 700.0
      CB: 4600.0
      Foreign: 8100.0
      FedInternal: 200.0
      TrustFunds_NonMarketable: 6800.0

tga_params:
  target_balance: 750.0
  floor: 100.0

# --- Fiscal Baseline (Deficit) ---

fiscal_baseline: &fiscal_baseline
  initial_weekly_spending: 120   # Higher than taxes
  initial_weekly_taxes: 100      # Lower than spending
  spending_growth_qtr: 0.01
  tax_growth_qtr: 0.01

# --- Default Issuance Profile ---

default_issuance_profile: &default_issuance_profile
  bills:
    category_cutoff_years: 1.0
    target_percentage_of_remainder: 0.20
    maturities: [0.25, 0.5, 1.0]
    maturity_distribution: [0.333, 0.333, 0.334]  # Split the 20%
  notes:
    category_cutoff_years: 10.0
    target_percentage_of_remainder: 0.60
    maturities: [2.0, 5.0, 10.0]
    maturity_distribution: [0.333, 0.333, 0.334]  # Split the 60%
  bonds:
    category_cutoff_years: 999.0
    target_percentage_of_remainder: 0.20
    maturities: [20.0, 30.0]
    maturity_distribution: [0.5, 0.5]             # Split the 20%
  remainder_maturity_years: 0.5

# --- Policy Issuance Profile: More notes, fewer bonds ---

policy_issuance_more_notes_fewer_bonds: &policy_issuance_more_notes_fewer_bonds
  bills:
    category_cutoff_years: 1.0
    # Slightly less reliance on short bills (highest rates in this config)
    target_percentage_of_remainder: 0.15
    maturities: [0.25, 0.5, 1.0]
    # Tilt toward 1‑year bills
    maturity_distribution: [0.20, 0.30, 0.50]

  notes:
    category_cutoff_years: 10.0
    # Moderately more issuance in 2–10y notes
    target_percentage_of_remainder: 0.70
    maturities: [2.0, 5.0, 10.0]
    # Lean toward 5–10y, which are cheaper than long bonds
    maturity_distribution: [0.20, 0.40, 0.40]

  bonds:
    category_cutoff_years: 999.0
    # Fewer 20–30y bonds (highest long coupons)
    target_percentage_of_remainder: 0.15
    maturities: [20.0, 30.0]
    # Tilt to 20y instead of 30y
    maturity_distribution: [0.70, 0.30]

  remainder_maturity_years: 0.5

# --- Yield Curves ---

# Standard upward-sloping curve (Prudent to avoid long bonds)
yield_curve_default: &yield_curve_default
  use_static: True
  years: [0.25, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 30.0]
  rates: [0.0400, 0.0410, 0.0425, 0.0450, 0.0475, 0.0500, 0.0515, 0.0525]

# Lower rates (parallel shift down 25bps)
yield_curve_lower: &yield_curve_lower
  use_static: True
  years: [0.25, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 30.0]
  rates: [0.0375, 0.0385, 0.0400, 0.0425, 0.0450, 0.0475, 0.0490, 0.0500]

# --- Sector Preferences ---

# Baseline: column sums = 1. Banks active in bills/notes.
sector_preferences_default: &sector_preferences_default
  Banks:   { bills_pct: 0.15, notes_pct: 0.20, bonds_pct: 0.10 }
  Private: { bills_pct: 0.45, notes_pct: 0.50, bonds_pct: 0.60 }
  CB:      { bills_pct: 0.15, notes_pct: 0.05, bonds_pct: 0.05 }
  Foreign: { bills_pct: 0.25, notes_pct: 0.25, bonds_pct: 0.25 }

# Banks buy a larger share (especially Notes), Private buys less (Domestic non-banks)
sector_preferences_banks_buy_more: &sector_preferences_banks_buy_more
  Banks:   { bills_pct: 0.25, notes_pct: 0.35, bonds_pct: 0.15 }
  Private: { bills_pct: 0.35, notes_pct: 0.35, bonds_pct: 0.55 }
  CB:      { bills_pct: 0.15, notes_pct: 0.05, bonds_pct: 0.05 }
  Foreign: { bills_pct: 0.25, notes_pct: 0.25, bonds_pct: 0.25 }

# Policy: Banks moderately more concentrated in notes (previously 0.40)
sector_preferences_banks_pref_notes: &sector_preferences_banks_pref_notes
  Banks:   { bills_pct: 0.15, notes_pct: 0.30, bonds_pct: 0.05 }
  Private: { bills_pct: 0.45, notes_pct: 0.40, bonds_pct: 0.65 }
  CB:      { bills_pct: 0.15, notes_pct: 0.05, bonds_pct: 0.05 }
  Foreign: { bills_pct: 0.25, notes_pct: 0.25, bonds_pct: 0.25 }

# --- Root defaults used for validation, generated portfolios, and fallback runs ---

fiscal_params: *fiscal_baseline
treasury_issuance_profile: *default_issuance_profile
yield_curve: *yield_curve_default
sector_preferences: *sector_preferences_default

# --- Additional Parameter Defaults (surfaced from simulation engine) ---

tips_params:
  cpi_start_level: 100.0
  cpi_annual_inflation: 0.0
  ref_cpi_lag_months: 3
  default_real_coupon_rate: 0.005

frn_params:
  benchmark_maturity_years: 0.25
  default_fixed_spread: 0.0005

nonmarketable_params:
  interest_rate_basis_maturities: [5.0, 10.0]
  interest_crediting_frequency: 'semi-annual'
  initial_holder: 'TrustFunds'
  rate_setting_method: 'yield_curve_points'

other_flows:
  reserve_transfer: 0.0
  cb_net_expense: 0.0
  money_minting_transfers: 0.0

rate_sensitive_demand:
  enabled: false
  min_multiplier: 0.25
  anchor_maturity_years: 5.0
  slope_short_maturity_years: 2.0
  slope_long_maturity_years: 10.0
  auction: {}
  secondary: {}

financing_cost_options:
  include_tips_inflation_accretion: false

# --- Scenario Definitions ---

scenario_groups:
  - group_name: "Treasury Market Scenarios"
    group_output_settings:
      save_plot_filename: "output/treasury_market_scenarios"
      graphs_to_show: ["TDC_Level", "FinancingCost_Cumulative", "DebtServiceOutlay_Cumulative", "AuctionProceeds"]
      output_mode: 'single_file'

    scenarios:
      - name: "Baseline"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_default
          yield_curve: *yield_curve_default

      - name: "BanksBuyFromPriv_25bpsLowerRates"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_banks_buy_more
          yield_curve: *yield_curve_lower

      - name: "MaturityShift_MoreNotes"
        overrides:
          fiscal_params: *fiscal_baseline
          # Policy: more notes, fewer bills and long bonds
          treasury_issuance_profile: *policy_issuance_more_notes_fewer_bonds
          # Banks have higher share in notes, so more issuance flows to banks
          sector_preferences: *sector_preferences_banks_pref_notes
          # Same yield curve as baseline: effect comes mainly from maturity mix + holder mix
          yield_curve: *yield_curve_default

  # --- One-Factor Isolation: each scenario changes exactly one mechanism ---
  - group_name: "One-Factor Isolation"
    group_output_settings:
      save_plot_filename: "output/one_factor_isolation"
      graphs_to_show: ["TDC_Level", "FinancingCost_Cumulative", "WAM", "AuctionProceeds"]
      output_mode: 'single_file'

    scenarios:
      - name: "Factorial_Baseline"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_default
          yield_curve: *yield_curve_default

      # Pure issuance mix change — holder prefs and rates unchanged
      - name: "Factorial_IssuanceOnly"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *policy_issuance_more_notes_fewer_bonds
          sector_preferences: *sector_preferences_default
          yield_curve: *yield_curve_default

      # Pure holder preference change — issuance mix and rates unchanged
      - name: "Factorial_HolderOnly"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_banks_buy_more
          yield_curve: *yield_curve_default

      # Pure yield curve change — issuance mix and holder prefs unchanged
      - name: "Factorial_RateOnly"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_default
          yield_curve: *yield_curve_lower

      # Pure holder note-preference change — issuance mix and rates unchanged
      # Isolates the holder shock embedded in MaturityShift_MoreNotes
      - name: "Factorial_HolderOnly_NotesPref"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_banks_pref_notes
          yield_curve: *yield_curve_default

  # --- Thesis Figure: TDC rises while debt-service costs fall ---
  - group_name: "TDC vs Debt Management"
    group_output_settings:
      save_plot_filename: "output/tdc_vs_cost"
      graphs_to_show: ["TDC_Level", "DebtServiceOutlay_Cumulative", "FinancingCost_Cumulative", "TotalDebt_Agg"]
      output_mode: 'single_file'

    scenarios:
      - name: "Baseline"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_default
          yield_curve: *yield_curve_default

      - name: "Bank-Favored Demand + Easier Rates"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *default_issuance_profile
          sector_preferences: *sector_preferences_banks_buy_more
          yield_curve: *yield_curve_lower

      - name: "Note-Centric Issuance"
        overrides:
          fiscal_params: *fiscal_baseline
          treasury_issuance_profile: *policy_issuance_more_notes_fewer_bonds
          yield_curve: *yield_curve_default
          sector_preferences: *sector_preferences_banks_pref_notes
